<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sucesso - Apaixonados por Focinhos</title>

		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
			rel="stylesheet" />
		<link rel="stylesheet" href="styles/style.css" />

		<style>
			/* Estilo para o fundo feliz usando sua variável corrigida */
			body.feliz {
				background-color: #f8fff9; /* Um tom de verde quase branco para sucesso */
			}
		</style>
	</head>

	<body class="feliz d-flex align-items-center justify-content-center vh-100">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-11 col-sm-8 col-md-6 col-lg-4 text-center">
					<div class="card border-0 shadow-lg rounded-4 overflow-hidden">
						<div class="bg-success" style="height: 10px"></div>

						<div class="card-body p-4 p-md-5 bg-white">
							<div class="mb-4">
								<img
									src="img/ok.png"
									alt="Cachorras felizes"
									class="img-fluid rounded-circle mx-auto d-block"
									style="
										width: 150px;
										height: 150px;
										object-fit: cover;
										border: 4px solid #e9f7ef;
									" />
							</div>

							<h2 class="h4 fw-bold text-success mb-3">Inscrição realizada! 🎉</h2>

							<p class="text-secondary mb-4">
								Tudo pronto! Agora seu pet está um passo mais perto de estar sempre seguro e
								identificado.
							</p>

							<div class="d-grid">
								<a href="index.html" class="btn btn-success rounded-pill py-2 fw-bold shadow-sm">
									Ir para a Página Inicial
								</a>
							</div>

							<div class="mt-4">
								<p class="small text-muted mb-0">
									Prepare os petiscos, as comemorações já podem começar! 🐾
								</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
